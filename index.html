<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健康指標追蹤｜呂昇鴻</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f2ede8; --bg2:#ebe5de; --card:#f8f4f0;
    --border:#d9cfc7; --border2:#c8bdb4;
    --text:#4a4240; --muted:#8c7f7a; --soft:#b5a89f;
    --accent:#8fa3a8; --accent2:#a8967e;
    --danger:#b07070; --warn:#b09070; --ok:#7a9e8a; --ok2:#6d8f8a;
    --shadow:rgba(74,66,64,0.08);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}

  /* Header */
  .header{background:var(--card);border-bottom:1px solid var(--border);padding:24px 36px 18px;position:sticky;top:0;z-index:200;}
  .header-inner{max-width:920px;margin:0 auto;}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:14px;}
  .patient-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin-bottom:5px;font-weight:500;}
  .patient-name{font-family:'Noto Serif TC',serif;font-size:22px;font-weight:600;}
  .patient-meta{font-size:12px;color:var(--muted);margin-top:3px;}
  .header-btns{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
  .btn{padding:7px 16px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--muted);font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
  .btn:hover{background:var(--bg2);color:var(--text);}
  .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600;}
  .btn-primary:hover{background:var(--ok2);border-color:var(--ok2);}
  .filter-tabs{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
  .tab{padding:4px 14px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
  .tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* Category tabs */
  .cat-tabs{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .cat-tab{padding:3px 12px;border-radius:14px;font-size:11px;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Noto Sans TC',sans-serif;transition:all .2s;}
  .cat-tab.active{background:var(--accent2);color:#fff;border-color:var(--accent2);}

  /* Main */
  .main{max-width:920px;margin:0 auto;padding:24px 20px 60px;}
  .alert-banner{background:#f0e8e8;border:1px solid #d4b5b5;border-left:4px solid var(--danger);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:13px;color:var(--danger);}
  .alert-banner.hidden{display:none;}

  /* Card */
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px 24px;margin-bottom:12px;box-shadow:0 2px 8px var(--shadow);transition:box-shadow .2s;}
  .card:hover{box-shadow:0 4px 16px var(--shadow);}
  .card.abnormal{border-color:#d4b5b5;box-shadow:0 2px 12px rgba(176,112,112,.1);}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
  .card-title-row{display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap;}
  .card-title{font-size:15px;font-weight:600;}
  .card-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--bg2);color:var(--muted);border:1px solid var(--border);font-weight:500;}
  .card-key{font-size:10px;color:var(--soft);font-family:monospace;}
  .card-right{text-align:right;}
  .card-value{font-family:'Noto Serif TC',serif;font-size:26px;font-weight:700;line-height:1;}
  .card-unit{font-size:12px;font-weight:400;color:var(--muted);margin-left:3px;}
  .badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;margin-top:5px;}
  .badge-danger{background:rgba(176,112,112,.15);color:var(--danger);border:1px solid rgba(176,112,112,.3);}
  .badge-ok{background:rgba(122,158,138,.15);color:var(--ok);border:1px solid rgba(122,158,138,.3);}
  .badge-warn{background:rgba(176,144,112,.15);color:var(--warn);border:1px solid rgba(176,144,112,.3);}
  .card-ref{font-size:11px;color:var(--muted);margin-bottom:8px;}
  .range-bar-bg{height:4px;background:var(--bg2);border-radius:10px;position:relative;margin-bottom:14px;overflow:visible;}
  .range-bar-ok{position:absolute;height:100%;background:rgba(122,158,138,.2);border-radius:10px;left:0;width:100%;}
  .range-bar-dot{position:absolute;width:10px;height:10px;border-radius:50%;top:-3px;transform:translateX(-50%);border:2px solid #fff;box-shadow:0 1px 4px var(--shadow);}
  .chart-wrap{height:100px;margin-bottom:7px;}
  .chart-legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center;font-size:10px;color:var(--muted);margin-bottom:10px;padding:4px 8px;background:var(--bg2);border-radius:7px;}
  .chart-legend-item{display:flex;align-items:center;gap:4px;}
  .legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
  .legend-dash{width:14px;height:0;border-top:2px dashed;flex-shrink:0;}
  .history-toggle{font-size:12px;color:var(--accent);cursor:pointer;display:inline-flex;align-items:center;gap:5px;user-select:none;padding:2px 0;}
  .history-toggle:hover{color:var(--ok2);}
  .history-table-wrap{display:none;margin-top:8px;border:1px solid var(--border);border-radius:9px;overflow:hidden;}
  .history-table-wrap.open{display:block;}
  .history-table{width:100%;border-collapse:collapse;font-size:12px;}
  .history-table th{text-align:left;padding:7px 10px;color:var(--muted);background:var(--bg2);font-weight:500;white-space:nowrap;border-bottom:1px solid var(--border);}
  .history-table td{padding:6px 10px;border-bottom:1px solid var(--bg2);color:var(--text);white-space:nowrap;}
  .history-table tr:last-child td{border-bottom:none;}
  .history-table .latest-row{background:rgba(143,163,168,.07);}
  .history-table .latest-row td{font-weight:600;}
  .trend-up{color:var(--danger);}.trend-down{color:var(--ok);}.trend-flat{color:var(--muted);}
  hr.divider{border:none;border-top:1px dashed var(--border);margin:12px 0;}
  .meaning-toggle{font-size:12px;color:var(--accent);cursor:pointer;display:inline-flex;align-items:center;gap:5px;user-select:none;}
  .meaning-toggle:hover{color:var(--ok2);}
  .meaning-box{margin-top:9px;padding:12px 15px;background:rgba(143,163,168,.1);border-left:3px solid var(--accent);border-radius:0 9px 9px 0;font-size:13px;color:var(--text);line-height:1.8;display:none;}
  .meaning-box.open{display:block;}
  .no-history{font-size:11px;color:var(--soft);margin-top:4px;}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(74,66,64,.55);display:none;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(4px);}
  .overlay.open{display:flex;}
  .modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:30px;width:min(600px,95vw);max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(74,66,64,.18);}
  .modal-title{font-family:'Noto Serif TC',serif;font-size:19px;font-weight:600;margin-bottom:4px;}
  .modal-sub{font-size:12px;color:var(--muted);margin-bottom:20px;}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
  .field-label{font-size:12px;color:var(--muted);margin-bottom:4px;}
  .field-input{width:100%;padding:8px 11px;border-radius:9px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none;font-family:'Noto Sans TC',sans-serif;transition:border-color .2s;}
  .field-input:focus{border-color:var(--accent);}
  .date-field{grid-column:1/-1;}
  .modal-btns{display:flex;gap:10px;}
  .modal-save{flex:1;padding:10px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;transition:background .2s;}
  .modal-save:hover{background:var(--ok2);}
  .modal-cancel{flex:1;padding:10px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:14px;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
  .section-title{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--soft);font-weight:600;margin:24px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
  .footer{text-align:center;font-size:11px;color:var(--soft);margin-top:36px;line-height:2;}
  @media(max-width:540px){.header{padding:16px 12px 14px;}.main{padding:16px 10px 60px;}.card{padding:14px 12px;}.card-value{font-size:22px;}.modal-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-top">
      <div>
        <div class="patient-label">Health Monitor</div>
        <div class="patient-name">呂昇鴻｜60歲 男性</div>
        <div class="patient-meta" id="meta-line"></div>
      </div>
      <div class="header-btns">
        <button class="btn btn-primary" onclick="openModal()">＋ 新增數據</button>
      </div>
    </div>
    <div class="filter-tabs">
      <button class="tab active" onclick="setFilter('all',this)">全部</button>
      <button class="tab" id="tab-abnormal" onclick="setFilter('abnormal',this)">異常</button>
      <button class="tab" id="tab-normal"   onclick="setFilter('normal',this)">正常</button>
    </div>
    <div class="cat-tabs" id="cat-tabs"></div>
  </div>
</div>

<div class="main">
  <div class="alert-banner hidden" id="alert-banner">
    ⚠️ 需要優先關注：<strong id="alert-items"></strong>
  </div>
  <div id="cards-container"></div>
  <div class="footer">
    本追蹤表僅供個人健康管理參考，不取代醫師診斷與治療建議<br>
    數據來源：台中聯合醫事檢驗所 / 大安聯合醫事檢驗所<br>
    最早記錄：2025-07-03　|　最新報告：2026-03-26
  </div>
</div>

<div class="overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">新增檢驗數據</div>
    <div class="modal-sub">填入本次報告數值，留空代表未檢測</div>
    <div class="modal-grid" id="modal-grid"></div>
    <div class="modal-btns">
      <button class="modal-save" onclick="saveData()">儲存</button>
      <button class="modal-cancel" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CLINICAL CONFIG
// ═══════════════════════════════════════════════════════
const CLINICAL = {
  // ── 腎臟功能 ────────────────────────────────────────
  eGFR:{
    label:"腎絲球過濾率 eGFR", tag:"腎臟功能", cat:"腎臟", unit:"ml/min/1.73m²",
    ref:{low:60, high:999}, color:"#b07070",
    meaning:"評估腎臟過濾功能的核心指標。60以下代表慢性腎病（CKD）：60–89輕度、45–59中度偏低（G3a）、30–44中度偏高（G3b）。本患者eGFR持續落在49–55區間，屬CKD G3a–G3b，需積極保護腎功能、控制血壓及蛋白尿。"
  },
  CRE_blood:{
    label:"血清肌酸酐", tag:"腎臟功能", cat:"腎臟", unit:"mg/dL",
    ref:{low:0.6, high:1.5}, color:"#b07070",
    meaning:"腎臟排除肌酸酐的能力指標。男性正常上限1.5 mg/dL。數值持續偏高（1.4–1.58）配合eGFR低下，確認腎功能損傷。每升高0.1 mg/dL，對應eGFR約下降5–7 ml/min。"
  },
  BUN:{
    label:"血中尿素氮 BUN", tag:"腎臟功能", cat:"腎臟", unit:"mg/dL",
    ref:{low:5, high:20}, color:"#b09070",
    meaning:"腎臟排除尿素氮的能力指標。持續偏高（19–28）反映腎臟清除廢物效率下降。BUN/Creatinine比值可區分腎前性（脫水/蛋白攝取過高）與腎性損傷。"
  },
  Urine24hProtein:{
    label:"24小時尿蛋白", tag:"腎臟功能", cat:"腎臟", unit:"mg/Day",
    ref:{low:0, high:150}, color:"#b07070",
    meaning:"評估腎小球屏障損傷程度。正常應低於150 mg/Day。本患者從248 mg降至109 mg，顯示蛋白尿有所改善，但仍超標。持續蛋白尿是腎功能惡化的強力預測因子，也與心血管風險相關。"
  },
  Microalbumin:{
    label:"微白蛋白尿", tag:"腎臟功能", cat:"腎臟", unit:"mg/L",
    ref:{low:0, high:25}, color:"#b07070",
    meaning:"腎小球早期損傷的敏感指標，也是心血管風險標記。正常<25 mg/L。本患者186.5→77.9，雖有改善但仍嚴重偏高，屬顯性蛋白尿（Macroalbuminuria），提示腎小球屏障受損明顯。"
  },
  MC_ratio:{
    label:"微白蛋白/肌酸酐比", tag:"腎臟功能", cat:"腎臟", unit:"mg/gCr",
    ref:{low:0, high:30}, color:"#b07070",
    meaning:"校正尿液稀釋度的蛋白尿指標，比單次尿液微白蛋白更準確。正常<30 mg/gCr，30–300為微量蛋白尿，>300為顯性蛋白尿。本患者224–200，屬顯性蛋白尿範圍，腎小球損傷明確。"
  },

  // ── 心血管 ───────────────────────────────────────────
  Homocysteine:{
    label:"同半胱胺酸", tag:"心血管", cat:"心血管", unit:"umol/L",
    ref:{low:6.5, high:19.5}, color:"#b07070",
    meaning:"血管健康核心指標。升高代表氧化壓力增加，直接損傷血管內皮細胞，增加中風、心肌梗塞及靜脈血栓風險。與葉酸/B12甲基化代謝密切相關。數值25.3需積極補充活性葉酸與甲鈷胺。"
  },
  LDL:{
    label:"低密度脂蛋白 LDL", tag:"心血管", cat:"心血管", unit:"mg/dL",
    ref:{low:0, high:129}, color:"#b07070",
    meaning:"「壞膽固醇」，與動脈硬化直接相關。7月163→8月77→12月69，顯示極大改善（可能已用藥治療）。CKD患者建議LDL<70 mg/dL，目前已接近目標值。"
  },
  HDL:{
    label:"高密度脂蛋白 HDL", tag:"心血管", cat:"心血管", unit:"mg/dL",
    ref:{low:40, high:999}, color:"#b09070",
    meaning:"「好膽固醇」，有助清除血管中多餘膽固醇。男性應≥40 mg/dL，理想≥60 mg/dL。7月測值35偏低，提示心血管保護力不足。建議增加有氧運動、戒菸、補充Omega-3。"
  },
  TotalCholesterol:{
    label:"總膽固醇", tag:"心血管", cat:"心血管", unit:"mg/dL",
    ref:{low:100, high:200}, color:"#b07070",
    meaning:"所有脂蛋白中膽固醇的總量。7月224偏高，配合當時LDL 163，顯示脂質代謝異常。目前LDL已大幅下降，推測總膽固醇也已改善（建議下次追查）。"
  },
  TG:{
    label:"三酸甘油脂 TG", tag:"心血管", cat:"心血管", unit:"mg/dL",
    ref:{low:50, high:200}, color:"#8fa3a8",
    meaning:"血液中脂肪含量指標。>200需注意，>500有胰臟炎風險。本患者101–180，目前正常但12月上升至152，與飲食及代謝有關。CKD患者TG常偏高，建議減少精緻糖與精緻澱粉。"
  },
  NTproBNP:{
    label:"NT-proBNP 心衰指標", tag:"心血管", cat:"心血管", unit:"pg/mL",
    ref:{low:0, high:125}, color:"#7a9e8a",
    meaning:"心臟壓力/心室功能的敏感指標，用於評估心臟衰竭。<125 pg/mL排除急性心衰竭。目前30.7屬正常水準，顯示心臟尚未出現明顯衰竭跡象。需注意CKD患者基礎值可能稍高。"
  },

  // ── 血糖 ────────────────────────────────────────────
  FBG:{
    label:"空腹血糖", tag:"血糖代謝", cat:"血糖", unit:"mg/dL",
    ref:{low:60, high:99}, color:"#b09070",
    meaning:"空腹8小時後的血糖值。100–125 mg/dL為糖尿病前期（空腹血糖過高）。本患者反覆測得102，屬糖尿病前期邊緣，配合CKD背景，建議減少精緻碳水、規律運動，每年追蹤HbA1c。"
  },
  HbA1c:{
    label:"醣化血色素 HbA1c", tag:"血糖代謝", cat:"血糖", unit:"%",
    ref:{low:4.3, high:6.3}, color:"#7a9e8a",
    meaning:"反映過去2–3個月的平均血糖控制狀況。5.7–6.4%為糖尿病前期。本患者三次均為5.8%，正常範圍但屬偏高區域，需持續觀察是否上升。CKD患者HbA1c可能因溶血稍被低估。"
  },

  // ── 嗜酸性球 ─────────────────────────────────────────
  Eosinophil_abs:{
    label:"嗜酸性球絕對計數", tag:"免疫/過敏", cat:"免疫", unit:"/μL (×10⁻³)",
    ref:{low:50, high:350}, color:"#b07070",
    meaning:"嗜酸性白血球的絕對數量。>350屬輕度升高，>1500為中度，>5000為重度。本患者560→430，輕度偏高且有下降趨勢。IgE正常的情況下，需優先排查寄生蟲感染（尤其弓蛔蟲Toxocara）。"
  },
  Eosinophil_pct:{
    label:"嗜酸性球百分比", tag:"免疫/過敏", cat:"免疫", unit:"%",
    ref:{low:0, high:5}, color:"#b07070",
    meaning:"嗜酸性球佔白血球的比例。>5%為偏高。本患者9月測得7.1%，配合絕對計數偏高，提示嗜酸性球活化。非IgE媒介型免疫反應或組織型寄生蟲感染是最可能原因。"
  },

  // ── 內分泌 ───────────────────────────────────────────
  "PTH-i":{
    label:"副甲狀腺素 PTH-i", tag:"內分泌", cat:"內分泌", unit:"pg/mL",
    ref:{low:15, high:68}, color:"#b09070",
    meaning:"調節鈣磷平衡的荷爾蒙。CKD患者腎臟無法活化維生素D，導致PTH代償性升高（繼發性副甲亢），加速骨質流失及血管鈣化。9月82.9偏高，12月49.4回歸正常，追蹤中。"
  },
  TSH:{
    label:"甲狀腺刺激素 TSH", tag:"內分泌", cat:"內分泌", unit:"UIU/mL",
    ref:{low:0.35, high:4.94}, color:"#7a9e8a",
    meaning:"評估甲狀腺功能的主要指標。TSH偏低=甲亢，偏高=甲低。甲狀腺低下可使同半胱胺酸升高並加速腎功能惡化。目前3.0在正常範圍，甲狀腺功能正常。"
  },
  UricAcid:{

let currentFilter="all";
let currentCat="全部";
const chartInstances={};

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
const sortedDates=()=>Object.keys(allData).sort();
const latestDate=()=>{const d=sortedDates();return d[d.length-1];};
function getStatus(key,val){
  const c=CLINICAL[key];if(!c)return"normal";
  if(val>c.ref.high)return"high";
  if(val<c.ref.low&&c.ref.low>0)return"low";
  return"normal";
}
function datesForKey(key){return sortedDates().filter(d=>allData[d]?.[key]!==undefined);}
function trendArrow(curr,prev){
  if(prev===undefined)return{txt:"—",cls:"trend-flat"};
  const diff=+(curr-prev).toFixed(2);
  if(diff===0)return{txt:"→ 持平",cls:"trend-flat"};
  return diff>0?{txt:`▲ +${Math.abs(diff)}`,cls:"trend-up"}:{txt:`▼ −${Math.abs(diff)}`,cls:"trend-down"};
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render(){
  const ld=latestDate();
  const ldat=allData[ld]||{};
  const all=sortedDates();

  // Collect all keys that have ANY data across all dates
  const allKeys=Object.keys(CLINICAL).filter(k=>all.some(d=>allData[d]?.[k]!==undefined));

  // Latest value per key (use latest date that has the key)
  function latestVal(key){
    const dates=datesForKey(key);
    if(!dates.length)return undefined;
    return allData[dates[dates.length-1]][key];
  }

  const abnormal=allKeys.filter(k=>{const v=latestVal(k);return v!==undefined&&getStatus(k,v)!=="normal";});
  const normal  =allKeys.filter(k=>{const v=latestVal(k);return v!==undefined&&getStatus(k,v)==="normal";});

  // meta
  document.getElementById("meta-line").innerHTML=
    `最新報告：<strong>${ld}</strong>　|　`+
    `<span style="color:${abnormal.length>0?"var(--danger)":"var(--ok)"};font-weight:600">${abnormal.length} 項異常</span>`+
    `　/　${allKeys.length} 項追蹤中　|　${all.length} 次採檢`;
  document.getElementById("tab-abnormal").textContent=`異常（${abnormal.length}）`;
  document.getElementById("tab-normal").textContent=`正常（${normal.length}）`;

  // alert
  const banner=document.getElementById("alert-banner");
  if(abnormal.length>0&&currentFilter!=="normal"){
    banner.classList.remove("hidden");
    document.getElementById("alert-items").textContent=abnormal.map(k=>CLINICAL[k]?.label).join("、");
  }else banner.classList.add("hidden");

  // category tabs
  buildCatTabs(allKeys,abnormal);

  // filter by status
  let displayKeys=currentFilter==="abnormal"?abnormal:currentFilter==="normal"?normal:[...abnormal,...normal];
  // filter by category
  if(currentCat!=="全部") displayKeys=displayKeys.filter(k=>CLINICAL[k]?.cat===currentCat);

  const container=document.getElementById("cards-container");
  container.innerHTML="";

  // group by cat for section titles
  const catOrder=["腎臟","心血管","血糖","免疫","內分泌","代謝","肝臟","蛋白","電解質","血液"];
  const grouped={};
  displayKeys.forEach(k=>{
    const c=CLINICAL[k]?.cat||"其他";
    if(!grouped[c])grouped[c]=[];
    grouped[c].push(k);
  });

  const orderedCats=currentCat!=="全部"?[currentCat]:catOrder.filter(c=>grouped[c]);
  orderedCats.forEach(cat=>{
    if(!grouped[cat])return;
    const sec=document.createElement("div");
    sec.className="section-title";
    sec.textContent=cat;
    container.appendChild(sec);
    grouped[cat].forEach(key=>buildCard(key,container));
  });
}

function buildCatTabs(allKeys,abnormal){
  const catsWithData=[...new Set(allKeys.map(k=>CLINICAL[k]?.cat).filter(Boolean))];
  const ordered=["腎臟","心血管","血糖","免疫","內分泌","代謝","肝臟","蛋白","電解質","血液"].filter(c=>catsWithData.includes(c));
  const wrap=document.getElementById("cat-tabs");
  wrap.innerHTML="";
  ["全部",...ordered].forEach(cat=>{
    const btn=document.createElement("button");
    btn.className="cat-tab"+(currentCat===cat?" active":"");
    const cnt=cat==="全部"?"":` (${allKeys.filter(k=>CLINICAL[k]?.cat===cat).length})`;
    btn.textContent=cat+cnt;
    btn.onclick=()=>{currentCat=cat;document.querySelectorAll(".cat-tab").forEach(b=>b.classList.remove("active"));btn.classList.add("active");render();};
    wrap.appendChild(btn);
  });
}

function buildCard(key,container){
  const c=CLINICAL[key];if(!c)return;
  const keyDates=datesForKey(key);
  if(!keyDates.length)return;
  const lv=allData[keyDates[keyDates.length-1]][key];
  if(lv===undefined)return;
  const status=getStatus(key,lv);
  const hasHist=keyDates.length>1;
  const latestDateForKey=keyDates[keyDates.length-1];

  // range bar
  const span=c.ref.high>900?lv*2:c.ref.high-c.ref.low;
  let dotPct=c.ref.high>900?50:((lv-c.ref.low)/span)*100;
  dotPct=Math.max(2,Math.min(98,dotPct));
  const dotColor=status==="high"?"var(--danger)":status==="low"?"var(--warn)":"var(--ok)";

  // table rows (newest first)
  const tableRows=[...keyDates].reverse().map((d,i,arr)=>{
    const v=allData[d][key];
    const prevD=arr[i+1];
    const prev=prevD?allData[prevD][key]:undefined;
    const tr=trendArrow(v,prev);
    const isLat=d===latestDateForKey;
    const tag=isLat?`<span style="font-size:10px;background:rgba(143,163,168,.2);color:var(--accent);padding:1px 7px;border-radius:8px;border:1px solid var(--accent)">最新</span>`:"";
    return`<tr class="${isLat?"latest-row":""}"><td>${d}</td><td><strong>${v}</strong> ${c.unit}</td><td class="${tr.cls}">${tr.txt}</td><td>${tag}</td></tr>`;
  }).join("");

  const safeid=key.replace(/[^a-z0-9]/gi,"_");
  const cardEl=document.createElement("div");
  cardEl.className="card"+(status!=="normal"?" abnormal":"");
  cardEl.innerHTML=`
    <div class="card-top">
      <div>
        <div class="card-title-row">
          <span class="card-title">${c.label}</span>
          <span class="card-tag">${c.tag}</span>
        </div>
        <div class="card-key">${key}　·　最新: ${latestDateForKey}</div>
      </div>
      <div class="card-right">
        <div class="card-value" style="color:${status!=="normal"?c.color:"var(--text)"}">
          ${lv}<span class="card-unit">${c.unit}</span>
        </div>
        ${status==="high"?'<span class="badge badge-danger">偏高 ▲</span>':status==="low"?'<span class="badge badge-warn">偏低 ▼</span>':'<span class="badge badge-ok">正常</span>'}
      </div>
    </div>
    <div class="card-ref">
      參考範圍：${c.ref.low===0?"< "+c.ref.high:c.ref.high>900?"≥ "+c.ref.low:c.ref.low+" – "+c.ref.high} ${c.unit}
      &ensp;|&ensp; 共 <strong>${keyDates.length}</strong> 次採檢
    </div>
    <div class="range-bar-bg">
      <div class="range-bar-ok"></div>
      <div class="range-bar-dot" style="left:${dotPct}%;background:${dotColor}"></div>
    </div>
    <div class="chart-wrap"><canvas id="chart_${safeid}"></canvas></div>
    <div class="chart-legend">
      <div class="chart-legend-item"><div class="legend-dot" style="background:${c.color}"></div><span>實測值</span></div>
      <div class="chart-legend-item"><div class="legend-dash" style="border-top-color:var(--danger)"></div><span>上限 ${c.ref.high>900?"∞":c.ref.high}</span></div>
      ${c.ref.low>0?`<div class="chart-legend-item"><div class="legend-dash" style="border-top-color:var(--warn)"></div><span>下限 ${c.ref.low}</span></div>`:""}
    </div>
    ${hasHist?`
    <div class="history-toggle" onclick="toggleSection(this,'htable_${safeid}','▶','▼')">
      <span>▶</span><span>歷史紀錄（共 ${keyDates.length} 筆）</span>
    </div>
    <div class="history-table-wrap" id="htable_${safeid}">
      <table class="history-table">
        <thead><tr><th>採檢日期</th><th>數值</th><th>較前次</th><th></th></tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>`:`<div class="no-history">尚無歷史紀錄</div>`}
    <hr class="divider">
    <div class="meaning-toggle" onclick="toggleSection(this,'meaning_${safeid}','▼','▲')">
      <span>▼</span> 臨床意義
    </div>
    <div class="meaning-box" id="meaning_${safeid}">${c.meaning}</div>
  `;
  container.appendChild(cardEl);
  requestAnimationFrame(()=>drawChart(key,keyDates,c,safeid));
}

// ═══════════════════════════════════════════════════════
// CHART
// ═══════════════════════════════════════════════════════
function drawChart(key,dates,c,safeid){
  const cvs=document.getElementById("chart_"+safeid);
  if(!cvs)return;
  if(chartInstances[key])chartInstances[key].destroy();
  const labels=dates.map(d=>d.slice(5));
  const values=dates.map(d=>allData[d][key]);
  const ctx=cvs.getContext("2d");
  const grad=ctx.createLinearGradient(0,0,0,95);
  grad.addColorStop(0,c.color+"55");grad.addColorStop(1,c.color+"00");
  const ptColors=values.map(v=>{const s=getStatus(key,v);return s==="high"?"#b07070":s==="low"?"#b09070":c.color;});
  chartInstances[key]=new Chart(ctx,{
    type:"line",
    data:{labels,datasets:[{
      data:values,borderColor:c.color,borderWidth:2,backgroundColor:grad,
      pointBackgroundColor:ptColors,pointBorderColor:"#fff",pointBorderWidth:1.5,
      pointRadius:5,pointHoverRadius:7,fill:true,tension:0.35,spanGaps:true
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{backgroundColor:"#f8f4f0",titleColor:"#8c7f7a",bodyColor:"#4a4240",borderColor:"#d9cfc7",borderWidth:1,padding:10,
          callbacks:{title:items=>dates[items[0].dataIndex],label:ctx=>`${ctx.parsed.y} ${c.unit}`}}
      },
      scales:{
        x:{grid:{color:"#ebe5de"},ticks:{color:"#8c7f7a",font:{size:10}},border:{display:false}},
        y:{grid:{color:"#ebe5de"},ticks:{color:"#8c7f7a",font:{size:10}},border:{display:false},
          suggestedMin:Math.min(...values,c.ref.low>0&&c.ref.high<900?c.ref.low:values[0])*0.88,
          suggestedMax:Math.max(...values,c.ref.high<900?c.ref.high:values[0])*1.12}
      }
    },
    plugins:[{id:"refLines",afterDraw(chart){
      const{ctx,chartArea:{left,right,top,bottom},scales:{y}}=chart;
      const dl=(val,color)=>{
        const yp=y.getPixelForValue(val);
        if(yp<top||yp>bottom)return;
        ctx.save();ctx.setLineDash([5,4]);ctx.strokeStyle=color;ctx.lineWidth=1;ctx.globalAlpha=0.65;
        ctx.beginPath();ctx.moveTo(left,yp);ctx.lineTo(right,yp);ctx.stroke();ctx.restore();
      };
      if(c.ref.high<900)dl(c.ref.high,"#b07070");
      if(c.ref.low>0)dl(c.ref.low,"#b09070");
    }}]
  });
}

// ═══════════════════════════════════════════════════════
// TOGGLES / FILTER

function toggleSection(el,targetId,closed,open){
  const target=document.getElementById(targetId);if(!target)return;
  const isOpen=target.classList.toggle("open");
  const arrow=el.querySelector("span");if(arrow)arrow.textContent=isOpen?open:closed;
}
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  btn.classList.add("active");render();
}

    const id="mf_"+key.replace(/[^a-z0-9]/gi,"_");
    const div=document.createElement("div");
    div.innerHTML=`<div class="field-label">${c.label}<span style="color:var(--soft);font-size:10px;margin-left:4px">${c.unit||"—"}</span></div><input class="field-input" type="number" step="0.01" id="${id}" placeholder="${c.ref.low>0&&c.ref.high<900?c.ref.low+"–"+c.ref.high:""}">`;
    grid.appendChild(div);
  });
  document.getElementById("modal-overlay").classList.add("open");
}
function closeModal(){document.getElementById("modal-overlay").classList.remove("open");}
function saveData(){
  const date=document.getElementById("modal-date").value;
  if(!date){alert("請選擇採檢日期");return;}
  const entry={};
  Object.keys(CLINICAL).forEach(key=>{
    const el=document.getElementById("mf_"+key.replace(/[^a-z0-9]/gi,"_"));
    if(el&&el.value!=="")entry[key]=parseFloat(el.value);
  });
  if(!Object.keys(entry).length){alert("請至少填入一項數值");return;}
  allData[date]={...(allData[date]||{}),...entry};
  closeModal();render();
}
document.getElementById("modal-overlay").addEventListener("click",function(e){if(e.target===this)closeModal();});

// init
render();
</script>
</body>
</html>
